<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sin conexión - Plakor Divisiones</title>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background-color: #f8fafc;
      color: #0f172a;
    }
    .container {
      text-align: center;
      padding: 2rem;
    }
    h1 {
      color: #0891b2;
      font-size: 2rem;
      margin-bottom: 1rem;
    }
    p {
      margin-bottom: 2rem;
      color: #475569;
    }
    button {
      background-color: #0891b2;
      color: white;
      border: none;
      padding: 0.75rem 1.5rem;
      border-radius: 0.5rem;
      cursor: pointer;
      font-size: 1rem;
    }
    button:hover {
      background-color: #0e7490;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Sin conexión</h1>
    <p>Lo sentimos, parece que no tienes conexión a Internet.</p>
    <button onclick="window.location.reload()">Intentar de nuevo</button>
  </div>
</body>
</html>
