<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- dinamic title seo -->
    <title>Plakor Divisiones | Expertos en Reformas y Construcción</title>
    
    <!-- Font optimization -->
    <link
      rel="preconnect"
      href="https://fonts.googleapis.com"
      crossorigin
    />
    <link
      rel="preconnect"
      href="https://fonts.gstatic.com"
      crossorigin
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      />
    </noscript>

    <!-- Meta tags for SEO -->
    <meta name="description" content="Expertos en construcción en seco, reformas y remodelaciones. Servicios profesionales de pladur en Tarragona." />
    <meta name="keywords" content="pladur, construcción, reformas, Tarragona, aislamientos, tabiques" />
    
    <!-- Open Graph tags -->
    <meta property="og:title" content="Plakor Divisiones - Expertos en Pladur" />
    <meta property="og:description" content="Servicios profesionales de construcción y reformas en Tarragona" />
    <meta property="og:type" content="website" />
    
    <!-- Performance optimizations -->
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://fonts.gstatic.com" />
    <link rel="dns-prefetch" href="https://images.unsplash.com" />
    
    <!-- Preload critical resources -->
    <link rel="preload" as="script" href="/src/main.tsx" />
    
    <!-- Critical CSS -->
    <style>
      /* Base styles to prevent FOUC */
      body {
        margin: 0;
        opacity: 0;
        transition: opacity 0.3s ease;
      }
      body.loaded {
        opacity: 1;
      }
    </style>

    <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">

    <!-- head after meta tags -->
    <link 
      rel="preload" 
      href="/fonts/inter-var.woff2" 
      as="font" 
      type="font/woff2" 
      crossorigin="anonymous"
    />

    <!-- add preload for critical images -->
    <link 
      rel="preload"
      as="image"
      href="/images/hero-bg.webp"
      media="(min-width: 768px)"
    />

    <!-- add modulepreload for main chunks -->
    <link rel="modulepreload" href="/src/components/Layout.tsx" />
    <link rel="modulepreload" href="/src/components/Header.tsx" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Shows content after loading
      window.addEventListener('load', () => {
        document.body.classList.add('loaded');
      });
    </script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/service-worker.js')
            .then(registration => {
              console.log('SW registered:', registration);
            })
            .catch(error => {
              console.log('SW registration failed:', error);
            });
        });
      }
    </script>
  </body>
</html>
